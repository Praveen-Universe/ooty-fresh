<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories - Ooty Fresh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='categories.css') }}">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <div class="logo">🌿 Ooty Fresh</div>
    </div>

    <div class="header-right">
        <a href="/cart" class="cart-icon">
            🛒
            <span class="cart-count">{{ cart_count if cart_count else 0 }}</span>
        </a>
    </div>
</header>

<!-- TITLE -->
<h2 class="page-title">Shop by Categories</h2>

<!-- CATEGORY GRID -->
<div class="category-grid">

    <a href="/category/vegetables" class="category-card">
        <div class="icon">🥦</div>
        <h3>Vegetables</h3>
        <p>Fresh from farms</p>
    </a>

    <a href="/category/fruits" class="category-card">
        <div class="icon">🍎</div>
        <h3>Fruits</h3>
        <p>Juicy & healthy</p>
    </a>

    <a href="/category/greens" class="category-card">
        <div class="icon">🥬</div>
        <h3>Greens</h3>
        <p>Leafy goodness</p>
    </a>

    <a href="/category/herbs" class="category-card">
        <div class="icon">🌿</div>
        <h3>Herbs</h3>
        <p>Natural flavors</p>
    </a>

    <a href="/category/exotics" class="category-card">
        <div class="icon">🥑</div>
        <h3>Exotics</h3>
        <p>Premium items</p>
    </a>

    <a href="/category/organic" class="category-card">
        <div class="icon">🌱</div>
        <h3>Organic</h3>
        <p>100% chemical-free</p>
    </a>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="/home" class="nav-item {% if active=='home' %}active{% endif %}">
        <span class="icon">🏠</span>
        <span class="text">Home</span>
    </a>

    <a href="/categories" class="nav-item {% if active=='categories' %}active{% endif %}">
        <span class="icon">📂</span>
        <span class="text">Categories</span>
    </a>

    <a href="/search" class="nav-item {% if active=='search' %}active{% endif %}">
        <span class="icon">🔍</span>
        <span class="text">Search</span>
    </a>

    <a href="/orders" class="nav-item {% if active=='orders' %}active{% endif %}">
        <span class="icon">📦</span>
        <span class="text">Orders</span>
    </a>

    <a href="/profile" class="nav-item {% if active=='profile' %}active{% endif %}">
        <span class="icon">👤</span>
        <span class="text">Profile</span>
    </a>
</nav>

</body>
</html>
