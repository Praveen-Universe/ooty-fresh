<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Ooty Fresh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🌿 Ooty Fresh</h2>

    <a href="/admin" class="active">📊 Dashboard</a>
    <!-- <a href="/admin_orders">📦 Orders</a> -->
    <a href="/admin_products">🛒 Products</a>
    <a href="/admin_customers">👥 Customers</a>

    <a href="/logout" class="logout">🚪 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <h2>Admin Dashboard</h2>
    </div>

    <!-- STATS CARDS -->
    <div class="cards">
        <div class="card">
            <h3>{{ orders }}</h3>
            <p>Total Orders</p>
        </div>

        <div class="card">
            <h3>{{ customers }}</h3>
            <p>Total Customers</p>
        </div>

        <div class="card">
            <h3>₹{{ revenue }}</h3>
            <p>Total Revenue</p>
        </div>
    </div>


    <!-- PRODUCT LIST -->
    <div class="section">
        <h3>Products</h3>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Action</th>
            </tr>

            {% for p in products %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ p[1] }}</td>
                <td>₹{{ p[2] }}</td>
                <td>
                    <a href="/delete/{{ p[0] }}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
