<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Search - Ooty Fresh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='search.css') }}">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">

            <div class="logo">🌿 Ooty Fresh</div>
        </div>

        <div class="header-right">
            <a href="/cart" class="cart-icon">
                🛒
                <span class="cart-count">{{ cart_count if cart_count else 0 }}</span>
            </a>
        </div>
    </header>

    <!-- SEARCH BAR -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search vegetables, fruits...">
    </div>

    <!-- CATEGORY FILTER -->
    <div class="categories">
        <div class="cat-chip active" onclick="setCategory('all')">All</div>
        <div class="cat-chip" onclick="setCategory('vegetables')">Vegetables</div>
        <div class="cat-chip" onclick="setCategory('fruits')">Fruits</div>
        <div class="cat-chip" onclick="setCategory('greens')">Greens</div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="product-grid"></div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item {% if active=='home' %}active{% endif %}">
            <span class="icon">🏠</span>
            <span class="text">Home</span>
        </a>

        <a href="/categories" class="nav-item {% if active=='categories' %}active{% endif %}">
            <span class="icon">📂</span>
            <span class="text">Categories</span>
        </a>

        <a href="/search" class="nav-item {% if active=='search' %}active{% endif %}">
            <span class="icon">🔍</span>
            <span class="text">Search</span>
        </a>

        <a href="/orders" class="nav-item {% if active=='orders' %}active{% endif %}">
            <span class="icon">📦</span>
            <span class="text">Orders</span>
        </a>

        <a href="/profile" class="nav-item {% if active=='profile' %}active{% endif %}">
            <span class="icon">👤</span>
            <span class="text">Profile</span>
        </a>
    </nav>

    <script src="{{ url_for('static', filename='search.js') }}"></script>

</body>

</html>
