<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile - Ooty Fresh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h2>👤 Profile</h2>
    </header>

    <!-- PROFILE CARD -->
    <div class="profile-card">
        <div class="avatar">👤</div>

        <h3>{{ user_name if user_name else "Guest User" }}</h3>
        <p class="email">{{ user_email if user_email else "guest@ootyfresh.com" }}</p>
    </div>

    <!-- MENU OPTIONS -->
    <div class="menu">

        <a href="/orders" class="menu-item">
            📦 <span>My Orders</span>
        </a>

        <a href="/cart" class="menu-item">
            🛒 <span>My Cart</span>
        </a>

        <a href="/categories" class="menu-item">
            📂 <span>Browse Categories</span>
        </a>

        <a href="/logout_user" class="menu-item logout">
            🚪 <span>Logout</span>
        </a>

    </div>

    <!-- APP INFO -->
    <div class="app-info">
        <p>🌿 Ooty Fresh</p>
        <small>Fresh from hills to your home</small>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item {% if active=='home' %}active{% endif %}">
            <span class="icon">🏠</span>
            <span class="text">Home</span>
        </a>

        <a href="/categories" class="nav-item {% if active=='categories' %}active{% endif %}">
            <span class="icon">📂</span>
            <span class="text">Categories</span>
        </a>

        <a href="/search" class="nav-item {% if active=='search' %}active{% endif %}">
            <span class="icon">🔍</span>
            <span class="text">Search</span>
        </a>

        <a href="/orders" class="nav-item {% if active=='orders' %}active{% endif %}">
            <span class="icon">📦</span>
            <span class="text">Orders</span>
        </a>

        <a href="/profile" class="nav-item {% if active=='profile' %}active{% endif %}">
            <span class="icon">👤</span>
            <span class="text">Profile</span>
        </a>
    </nav>

</body>

</html>
