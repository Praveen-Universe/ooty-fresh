<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup - Ooty Fresh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h2>🌿 Ooty Fresh</h2>
    </header>

    <!-- SIGNUP -->
    <div class="signup-container">
        <div class="signup-card">
            <h2>📝 Create Account</h2>
            <p>Join us for fresh products</p>

            <form method="POST">
                <input type="text" name="name" placeholder="👤 Name" required>
                <input type="email" name="email" placeholder="📧 Email" required>
                <input type="password" name="password" placeholder="🔒 Password" required>

                <button type="submit">Signup</button>
            </form>

            <div class="login-link">
                Already have an account?
                <a href="/login_user">Login</a>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item {% if active=='home' %}active{% endif %}">
            <span class="icon">🏠</span>
            <span class="text">Home</span>
        </a>

        <a href="/categories" class="nav-item {% if active=='categories' %}active{% endif %}">
            <span class="icon">📂</span>
            <span class="text">Categories</span>
        </a>

        <a href="/search" class="nav-item {% if active=='search' %}active{% endif %}">
            <span class="icon">🔍</span>
            <span class="text">Search</span>
        </a>

        <a href="/orders" class="nav-item {% if active=='orders' %}active{% endif %}">
            <span class="icon">📦</span>
            <span class="text">Orders</span>
        </a>

        <a href="/profile" class="nav-item {% if active=='profile' %}active{% endif %}">
            <span class="icon">👤</span>
            <span class="text">Profile</span>
        </a>
    </nav>

</body>

</html>
